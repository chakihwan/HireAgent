services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hireagent-postgres
    environment:
      POSTGRES_USER: hireagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: hireagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: hireagent-ollama
    ports:
      - "11435:11434"          # 11434는 다른 프로젝트 컨테이너가 선점, 11435 사용
    volumes:
      - ${HOME}/.ollama:/root/.ollama   # WSL2 기존 모델 재사용 (재다운로드 불필요)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireagent-backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql://hireagent:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hireagent
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      OLLAMA_BASE_URL: http://ollama:11434    # Docker 내부 네트워크로 직접 연결
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hireagent-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      WATCHPACK_POLLING: "true"    # WSL2 inotify 미동작 → 폴링으로 HMR 활성화
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
