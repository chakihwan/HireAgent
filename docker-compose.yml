services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hireagent-postgres
    environment:
      POSTGRES_USER: hireagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: hireagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hireagent-backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql://hireagent:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hireagent
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

